<div id="container">
  <header id="header-section">
    <h1 class="main-title">Sale Konferencyjne</h1>
    <p class="subtitle">Rezerwuj sale dla swojego zespołu</p>
  </header>

  <section id="info-blocks">
    <div class="info-block" *ngFor="let block of infoBlocks; let i = index">
      <div class="block-content">
        <p>{{ block.label }}</p>
        <h3>{{ block.value }}</h3>
      </div>

      <div class="block-icon">
        <i [class]="block.icon"></i>
      </div>
    </div>
  </section>

  <section id="reservation-form-section">
    <div id="titleAndIcon">
      <i class="fas fa-calendar-day"></i>
      <h2>Wybierz termin rezerwacji</h2>
    </div>

    <form [formGroup]="confRoomReservationForm" id="reservationForm">
      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Termin rezerwacji</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="date" />
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Godzina rozpoczęcia</mat-label>
        <input
          matInput
          [matTimepicker]="pickerStart"
          formControlName="startTime"
          matTimepickerMin="8:00"
          matTimepickerMax="18:00"
        />
        <mat-timepicker-toggle matIconSuffix [for]="pickerStart" />
        <mat-timepicker interval="30m" #pickerStart />
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Godzina zakończenia</mat-label>
        <input
          matInput
          [matTimepicker]="pickerEnd"
          formControlName="endTime"
          matTimepickerMin="8:00"
          matTimepickerMax="18:00"
        />
        <mat-timepicker-toggle matIconSuffix [for]="pickerEnd" />
        <mat-timepicker interval="30m" #pickerEnd />
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Piętro </mat-label>
        <mat-select formControlName="floor">
          <mat-option value="">Wszystkie piętra</mat-option>
          <mat-option *ngFor="let floor of floors" [value]="floor.id">
            {{ floor.name }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </section>

  <section id="conferenceRooms-section">
    @for (confRoom of filteredRooms; track $index) {
    <app-conference-room-card
      [conferenceRoom]="confRoom"
      [startTime]="confRoomReservationForm.value.startTime"
      [endTime]="confRoomReservationForm.value.endTime"
      [reservation]="getCurrentReservationForConfRoom(confRoom.id)"
    ></app-conference-room-card>
    }
  </section>
</div>
